<h2 mat-dialog-title>
  {{ 'titles.paymentSummary' | transloco }}
</h2>

<mat-dialog-content>
  <div class="summary-item">
    <strong>{{ 'labels.plate' | transloco }}:</strong>
    {{ data.plate }}
  </div>

  <div class="summary-item">
    <strong>{{ 'labels.vehicleType' | transloco }}:</strong>
    {{ data.vehicleType }}
  </div>

  <div class="summary-item">
    <strong>{{ 'labels.totalMinutes' | transloco }}:</strong>
    {{ data.totalMinutes }}
  </div>

  <div class="summary-item">
    <strong>{{ 'labels.totalAmount' | transloco }}:</strong>
    $ {{ data.totalAmount }}
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" mat-dialog-close>
    {{ 'buttons.close' | transloco }}
  </button>
</mat-dialog-actions>
