<h2 mat-dialog-title>
  Payment Summary
</h2>

<mat-dialog-content>
  <div class="summary-item">
    <strong>Plate:</strong>
    {{ data.plate }}
  </div>

  <div class="summary-item">
    <strong>Vehicle Type:</strong>
    {{ data.vehicleType }}
  </div>

  <div class="summary-item">
    <strong>Total Minutes:</strong>
    {{ data.totalMinutes }}
  </div>

  <div class="summary-item">
    <strong>Total Amount:</strong>
    $ {{ data.totalAmount }}
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-raised-button color="primary" mat-dialog-close>
    Close
  </button>
</mat-dialog-actions>
