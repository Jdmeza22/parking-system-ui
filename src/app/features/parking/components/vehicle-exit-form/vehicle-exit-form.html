<h2>{{ 'titles.exit' | transloco }}</h2>

<form [formGroup]="form" (ngSubmit)="registerExit()">

  <mat-form-field appearance="outline">
    <mat-label>
      {{ 'labels.plate' | transloco }}
    </mat-label>

    <input matInput formControlName="plate">
  </mat-form-field>

  <button mat-raised-button color="accent" type="submit" [disabled]="loading">
    {{ 'buttons.registerExit' | transloco }}
  </button>

</form>
