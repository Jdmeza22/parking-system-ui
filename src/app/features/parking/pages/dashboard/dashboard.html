<div class="dashboard-container">
  <div class="dashboard-header">
    <div class="header-content">
      <h1>{{ 'titles.dashboard' | transloco }}</h1>
      <p>Manage vehicle entries and exits efficiently</p>
    </div>
  </div>

  <div class="forms-grid">
    <mat-card class="dashboard-card">
      <mat-card-content>
        <app-vehicle-entry-form />
      </mat-card-content>
    </mat-card>

    <mat-card class="dashboard-card">
      <mat-card-content>
        <app-vehicle-exit-form />
      </mat-card-content>
    </mat-card>
  </div>

  <mat-card class="table-card">
    <mat-card-content>
      <app-active-vehicles-table />
    </mat-card-content>
  </mat-card>

</div>
